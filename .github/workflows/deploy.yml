name: Deploy GeoFile

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/xela811/geofile-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build backend jar
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: xela811
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -f deploy/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push backend image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.ALIYUN_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ansible-playbook ansible/playbooks/deploy.yml \
            -i "${{ secrets.ALIYUN_HOST }}," \
            -u "${{ secrets.ALIYUN_USER }}" \
            --private-key ~/.ssh/id_rsa \
            -e "backend_image=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -e "mysql_root_password=${{ secrets.MYSQL_ROOT_PASSWORD }}" \
            -e "jwt_secret=${{ secrets.JWT_SECRET }}" \
            -e "amap_api_key=${{ secrets.AMAP_API_KEY }}" \
            -e "ghcr_username=${{ secrets.GHCR_USERNAME }}" \
            -e "ghcr_token=${{ secrets.GHCR_TOKEN }}"
