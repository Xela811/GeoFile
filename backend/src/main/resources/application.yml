spring:
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8  # 连接池最大连接数
  application:
    name: geofile
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/geofile?characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

# JWT配置
jwt:
  secret: geofile-secret-key-2024-2025-very-long-secret-key-for-jwt-generation
  expiration: 300  # 验证码有效期5分钟

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j & SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.geofile

# knife4j配置
#knife4j:
#  enable: true
#  setting:
#    language: zh-CN

# 高德地图 API 配置
# 配置说明：
# 1. 访问 https://console.amap.com/dev/key/app 注册并获取 API Key
# 2. 选择"Web端（JS API）"或"Web服务 API"密钥
# 3. 将获取到的 Key 填入 amap.key 配置项
# 4. 可选配置 amap.url（默认为 https://restapi.amap.com/v3）
amap:
  key: ${amap_api_key}  # 请替换为你的高德地图API Key
  url: https://restapi.amap.com/v3

# 文件上传配置
file:
  upload:
    path: /home/xela/Projects/GeoFile/uploads